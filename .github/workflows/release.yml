name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version string to stamp into dry-run artifacts
        required: true
        default: v0.0.0-test
      upload_release:
        description: Upload artifacts to an existing GitHub Release instead of keeping them as workflow artifacts
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  LINUX_GLIBC_VERSION: "2.28"
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

permissions:
  contents: read

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-amd64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            cargo_target: x86_64-unknown-linux-gnu
            artifact: tar.gz
          - build: linux-arm64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            cargo_target: aarch64-unknown-linux-gnu
            artifact: tar.gz
          - build: darwin-amd64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            cargo_target: x86_64-apple-darwin
            macosx_deployment_target: "10.15"
            artifact: tar.gz
          - build: darwin-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            cargo_target: aarch64-apple-darwin
            macosx_deployment_target: "11.0"
            artifact: tar.gz
          - build: windows-amd64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            cargo_target: x86_64-pc-windows-msvc
            rustflags: "-C target-feature=+crt-static"
            artifact: zip
          - build: windows-arm64
            os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            cargo_target: aarch64-pc-windows-msvc
            rustflags: "-C target-feature=+crt-static"
            artifact: zip
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y binutils cmake make ninja-build perl pkg-config

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild@0.22.3
          fallback: none

      - name: Rust build
        shell: bash
        env:
          FETCH_VERSION: ${{ env.RELEASE_VERSION }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target || '' }}
          RUSTFLAGS: --cfg reqwest_unstable ${{ matrix.rustflags || '' }}
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cargo zigbuild --release --locked --target "${{ matrix.cargo_target }}.${LINUX_GLIBC_VERSION}"
          else
            cargo build --release --locked --target "${{ matrix.cargo_target }}"
          fi

      - name: Verify Linux glibc floor
        if: runner.os == 'Linux'
        shell: bash
        run: |
          binary="target/${{ matrix.rust_target }}/release/fetch"
          max_glibc="$(
            readelf -W --version-info --dyn-syms "$binary" \
              | sed -n 's/.*Name: GLIBC_\([0-9.]*\).*/\1/p' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "$max_glibc" ]]; then
            echo "No GLIBC symbol versions found in $binary" >&2
            exit 1
          fi
          highest="$(printf '%s\n%s\n' "$max_glibc" "$LINUX_GLIBC_VERSION" | sort -V | tail -n 1)"
          if [[ "$highest" != "$LINUX_GLIBC_VERSION" ]]; then
            echo "$binary requires GLIBC_$max_glibc, expected GLIBC_$LINUX_GLIBC_VERSION or older" >&2
            exit 1
          fi
          echo "$binary requires GLIBC_$max_glibc"

      - name: Build archive (unix)
        if: matrix.artifact == 'tar.gz'
        shell: bash
        run: |
          staging="fetch-${RELEASE_VERSION}-${{ matrix.build }}"
          mkdir "$staging"
          cp "target/${{ matrix.rust_target }}/release/fetch" "$staging/fetch"
          tar czf "$staging.tar.gz" -C "$staging" fetch
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Build archive (windows)
        if: matrix.artifact == 'zip'
        shell: pwsh
        run: |
          $staging = "fetch-${env:RELEASE_VERSION}-${{ matrix.build }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.rust_target }}/release/fetch.exe" "$staging/fetch.exe"
          Compress-Archive -Path "$staging/fetch.exe" -DestinationPath "$staging.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "$staging.zip").Hash.ToLowerInvariant()
          "$hash  $staging.zip" | Out-File -Encoding ascii "$staging.zip.sha256"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release archive
        if: github.event_name == 'release' || inputs.upload_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_VERSION" "$ASSET" "$ASSET.sha256" --clobber

      - name: Upload dry-run artifact
        if: github.event_name == 'workflow_dispatch' && !inputs.upload_release
        uses: actions/upload-artifact@v4
        with:
          name: fetch-${{ env.RELEASE_VERSION }}-${{ matrix.build }}.${{ matrix.artifact }}
          path: |
            fetch-${{ env.RELEASE_VERSION }}-${{ matrix.build }}.${{ matrix.artifact }}
            fetch-${{ env.RELEASE_VERSION }}-${{ matrix.build }}.${{ matrix.artifact }}.sha256

  latest:
    if: github.event_name == 'release'
    runs-on: "ubuntu-latest"
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit ${{ github.ref_name }} --prerelease=false
          gh release edit ${{ github.ref_name }} --latest

      - name: Notify tap repository
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/ryanfowler/homebrew-tap/dispatches \
            -f event_type=update-fetch \
            -f 'client_payload[version]=${{ github.ref_name }}'
