name: release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - build: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tar.gz
          - build: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tar.gz
          - build: darwin-amd64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: tar.gz
          - build: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: tar.gz
          - build: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: zip
          - build: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: zip
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Rust build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          FETCH_VERSION: ${{ github.ref_name }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build archive (unix)
        if: matrix.artifact == 'tar.gz'
        shell: bash
        run: |
          staging="fetch-${{ github.ref_name }}-${{ matrix.build }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/fetch" "$staging/fetch"
          tar czf "$staging.tar.gz" -C "$staging" fetch
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Build archive (windows)
        if: matrix.artifact == 'zip'
        shell: pwsh
        run: |
          $staging = "fetch-${{ github.ref_name }}-${{ matrix.build }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fetch.exe" "$staging/fetch.exe"
          Compress-Archive -Path "$staging/fetch.exe" -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ${{ env.ASSET }} --clobber

  latest:
    runs-on: "ubuntu-latest"
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Mark release as latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit ${{ github.ref_name }} --prerelease=false
          gh release edit ${{ github.ref_name }} --latest

      - name: Notify tap repository
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/ryanfowler/homebrew-tap/dispatches \
            -f event_type=update-fetch \
            -f 'client_payload[version]=${{ github.ref_name }}'
